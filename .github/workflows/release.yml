name: Create Release Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (number, e.g., 42)'
        required: true
        type: number
      version_name:
        description: 'Version name (e.g., 1.2.3)'
        required: true
        type: string
      release_title:
        description: 'Release title (empty for auto-generate)'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Is prerelease'
        required: true
        type: boolean
        default: false
      custom_release_notes:
        description: 'Custom release notes (empty for auto-generate)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make script executable
        run: chmod +x .github/scripts/create-release.sh

      - name: Generate release title
        id: title
        run: |
          if [[ -n "${{ github.event.inputs.release_title }}" ]]; then
            TITLE="${{ github.event.inputs.release_title }}"
          else
            TODAY=$(date +'%Y-%m-%d')
            TITLE="Release v${{ github.event.inputs.version_name }} ($TODAY)"
          fi
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(./.github/scripts/create-release.sh generate-notes \
            "${{ github.event.inputs.version_name }}" \
            "${{ github.event.inputs.version_code }}" \
            "false")
          
          echo 'notes<<EOF' >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Modify gradle file
        run: |
          ./.github/scripts/create-release.sh modify-gradle \
            "app/build.gradle.kts" \
            "${{ github.event.inputs.version_code }}" \
            "${{ github.event.inputs.version_name }}"

      - name: Export keystore
        run: |
          if [[ -n "${{ secrets.KEYSTORE_PROPERTIES }}" ]]; then
            echo "${{ secrets.KEYSTORE_PROPERTIES }}" | base64 -d > keystore.properties
          fi
          if [[ -n "${{ secrets.KEYSTORE_FILE }}" ]]; then
            echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > app/release.keystore
          fi

      - name: Build release
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4g -XX:MaxMetaspaceSize=1g'"

      - name: Prepare assets
        id: assets
        run: |
          ./.github/scripts/create-release.sh prepare-assets \
            "${{ github.event.inputs.version_name }}" \
            "${{ github.event.inputs.version_code }}" \
            "${{ github.workspace }}"

      - name: Create tag
        env:
          TAG_NAME: v${{ github.event.inputs.version_name }}-build${{ github.event.inputs.version_code }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            git tag -d "$TAG_NAME"
            git push --delete origin "$TAG_NAME" 2>/dev/null || true
          fi
          
          git tag -a "$TAG_NAME" -m "Release v${{ github.event.inputs.version_name }} (Build ${{ github.event.inputs.version_code }})"
          git push origin "$TAG_NAME"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="v${{ github.event.inputs.version_name }}-build${{ github.event.inputs.version_code }}"
          
          RELEASE_ARGS=(
            --repo "${{ github.repository }}"
            --tag "$TAG_NAME"
            --target "${{ github.sha }}"
            --title "${{ steps.title.outputs.title }}"
            --notes "${{ steps.notes.outputs.notes }}"
          )
          
          if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi
          
          gh release create "${RELEASE_ARGS[@]}"
          
          for asset in release-assets/*; do
            if [[ -f "$asset" ]]; then
              gh release upload "$TAG_NAME" "$asset" --repo "${{ github.repository }}" --clobber
            fi
          done

      - name: Summary
        if: always()
        run: |
          echo "## ✅ Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`v${{ github.event.inputs.version_name }}-build${{ github.event.inputs.version_code }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.event.inputs.version_name }} (Code: ${{ github.event.inputs.version_code }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Assets" >> $GITHUB_STEP_SUMMARY
          ls -la release-assets/ | awk '{print "* " $9 " (" $5 " bytes)"}' >> $GITHUB_STEP_SUMMARY